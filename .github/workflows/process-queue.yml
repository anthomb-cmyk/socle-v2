name: process-queue

# Drains the lead_post_processing_queue every 5 minutes by hitting the
# Next.js cron endpoint. Replaces the Railway scheduled cron service,
# which silently stopped firing after creation (Hobby-plan scheduler issue).
#
# Auth: Bearer token in CRON_SECRET (set as a GitHub Actions secret).
# The same secret value lives in Railway env vars on the web service so
# /api/cron/process-queue can validate the inbound request.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: POST to /api/cron/process-queue
        run: |
          curl -fsS --max-time 200 -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://socle-v2-production.up.railway.app/api/cron/process-queue
