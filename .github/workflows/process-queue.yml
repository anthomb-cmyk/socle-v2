name: process-queue

# Drains the lead_post_processing_queue every 5 minutes by hitting the
# Next.js cron endpoint. Replaces the Railway scheduled cron service,
# which silently stopped firing after creation (Hobby-plan scheduler issue).
#
# Auth: Bearer token in CRON_SECRET (set as a GitHub Actions secret).
# The same secret value lives in Railway env vars on the web service so
# /api/cron/process-queue can validate the inbound request.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: POST to /api/cron/process-queue
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # Sanity-check the secret is non-empty (don't print the value).
          if [ -z "$CRON_SECRET" ]; then
            echo "ERROR: CRON_SECRET secret is empty or missing in this repo's Actions secrets."
            exit 1
          fi
          echo "CRON_SECRET length: ${#CRON_SECRET}"

          # Hit the endpoint, capture body + status, fail loudly if non-2xx.
          HTTP_CODE=$(curl -sS -o /tmp/body.txt -w "%{http_code}" --max-time 200 -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://socle-v2-production.up.railway.app/api/cron/process-queue)
          echo "HTTP $HTTP_CODE"
          echo "--- body ---"
          cat /tmp/body.txt
          echo
          echo "--- end body ---"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            exit 1
          fi
